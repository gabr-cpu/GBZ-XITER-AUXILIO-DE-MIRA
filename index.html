<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GBZ XITER</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    background: radial-gradient(circle, #1a0005, #000);
    font-family:'Inter',sans-serif;
    color:white;
}

/* CENTRAL */
.screen{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* CARD */
.card{
    width:90%;
    max-width:360px;
    padding:25px;
    border-radius:20px;
    background:#0a0a0a;
    box-shadow:0 0 40px #ff004c70;
    border:1px solid #ff004c30;
    animation:fade .5s;
}

/* TITLE */
.title{
    font-family:'Orbitron';
    font-size:24px;
    color:#ff2b6a;
    text-align:center;
}

/* TEXT */
.sub{
    text-align:center;
    font-size:13px;
    color:#aaa;
    margin-top:5px;
}

/* INPUT */
.input-box{
    margin-top:20px;
    position:relative;
}
.input-box::before{
    content:"🔑";
    position:absolute;
    left:12px;
    top:50%;
    transform:translateY(-50%);
}

input{
    width:100%;
    padding:14px 14px 14px 40px;
    border-radius:12px;
    border:1px solid #ff2b6a40;
    background:#050505;
    color:white;
}

/* BUTTON */
button{
    width:100%;
    margin-top:20px;
    padding:14px;
    border:none;
    border-radius:12px;
    background:linear-gradient(45deg,#ff2b6a,#ff004c);
    color:white;
    font-weight:bold;
}

/* FOOT */
.footer{
    margin-top:15px;
    font-size:12px;
    text-align:center;
    color:#777;
}
.footer span{color:#ff2b6a}

/* PANEL */
.panel{
    display:none;
    padding:20px;
    animation:fade .4s;
}

/* HEADER */
.header{
    text-align:center;
    font-family:'Orbitron';
    color:#ff2b6a;
    margin-bottom:10px;
}

/* TABS */
.tabs{
    display:flex;
    justify-content:center;
    gap:10px;
}

.tabs button{
    width:auto;
    padding:8px 15px;
    font-size:12px;
}

/* BOX */
.box{
    margin-top:20px;
    background:#0a0a0a;
    padding:15px;
    border-radius:15px;
    box-shadow:0 0 20px #ff004c50;
}

/* SWITCH */
.row{
    display:flex;
    justify-content:space-between;
    margin:10px 0;
}

.switch{
    position:relative;
    width:40px;
    height:20px;
}
.switch input{display:none}

.slider{
    position:absolute;
    width:100%;
    height:100%;
    background:#333;
    border-radius:20px;
}
.slider::before{
    content:"";
    position:absolute;
    width:16px;height:16px;
    background:white;
    border-radius:50%;
    top:2px;left:2px;
    transition:.3s;
}

input:checked + .slider{
    background:#ff2b6a;
}
input:checked + .slider::before{
    transform:translateX(20px);
}

/* RANGE */
input[type=range]{width:100%}

/* BTN */
.big{
    margin-top:15px;
}

/* ANIMAÇÃO */
@keyfra
