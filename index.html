<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GBZ XITER</title>

<!-- FONTE BONITA -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: #050b14;
    color: white;
}

/* LOGIN */
.login {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    width: 350px;
    padding: 30px;
    background: #0a1625;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 0 40px #00c3ff55;
    animation: fade 0.6s ease;
}

.title {
    font-size: 28px;
    font-weight: 700;
    color: #00c3ff;
}

.subtitle {
    font-size: 14px;
    opacity: 0.7;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    outline: none;
    background: #08101d;
    color: white;
    margin-top: 10px;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(45deg,#00c3ff,#0077ff);
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* DASHBOARD */
.panel {
    display: none;
    padding: 20px;
    animation: fade 0.5s ease;
}

.header {
    font-size: 22px;
    font-weight: 700;
    color: #00c3ff;
    text-align: center;
    margin-bottom: 20px;
}

/* TABS */
.tabs {
    display: flex;
    justify-content: center;
    gap: 10px;
}

.tabs button {
    width: auto;
    padding: 10px 20px;
}

/* BOX */
.box {
    margin-top: 20px;
    padding: 20px;
    border-radius: 15px;
    background: #0a1625;
    box-shadow: 0 0 25px #00c3ff33;
}

/* TOGGLE */
.toggle {
    display: flex;
    justify-content: space-between;
    margin: 15px 0;
}

/* SWITCH */
.switch {
    position: relative;
    width: 45px;
    height: 22px;
}

.switch input {
    display: none;
}

.slider {
    position: absolute;
    background: #333;
    border-radius: 30px;
    width: 100%;
    height: 100%;
}

.slider::before {
    content: "";
    position: absolute;
    width: 18px;
    height: 18px;
    background: white;
    border-radius: 50%;
    top: 2px;
    left: 2px;
    transition: 0.3s;
}

input:checked + .slider {
    background: #00c3ff;
}

input:checked + .slider::before {
    transform: translateX(22px);
}

/* SLIDER */
input[type=range] {
    width: 100%;
}

/* ANIMAÇÃO */
@keyframes fade {
    from {opacity:0; transform: translateY(10px);}
    to {opacity:1;}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
    <div class="card">
        <div class="title">GBZ XITER</div>
        <div class="subtitle">Ativar sistema</div>
        <input type="text" id="key" placeholder="Digite sua chave">
        <button onclick="login()">ATIVAR</button>
    </div>
</div>

<!-- PAINEL -->
<div class="panel" id="panel">

    <div class="header">GBZ XITER</div>

    <div class="tabs">
        <button onclick="show('fun')">Funções</button>
        <button onclick="show('motor')">Motor</button>
        <button onclick="show('info')">Info</button>
    </div>

    <!-- FUNÇÕES -->
    <div class="box" id="fun">
        <div class="toggle">Modo desempenho
            <label class="switch"><input type="checkbox"><span class="slider"></span></label>
        </div>

        <div class="toggle">Suavização de toque
            <label class="switch"><input type="checkbox"><span class="slider"></span></label>
        </div>

        <div class="toggle">Redução de lag
            <label class="switch"><input type="checkbox"><span class="slider"></span></label>
        </div>

        <button onclick="start()">INICIAR</button>
    </div>

    <!-- MOTOR -->
    <div class="box" id="motor" style="display:none;">
        <p>Sensibilidade</p>
        <input type="range">

        <p>DPI</p>
        <input type="range">

        <p>Velocidade</p>
        <input type="range">
    </div>

    <!-- INFO -->
    <div class="box" id="info" style="display:none;">
        <p>Versão: 2.0</p>
        <p>Status: Online</p>
        <p>Compatível: Android</p>
    </div>

</div>

<script>
function login(){
    let k = document.getElementById("key").value;

    if(k === "GBZSTAR-666"){
        document.getElementById("login").style.display = "none";
        document.getElementById("panel").style.display = "block";
    } else {
        alert("Chave inválida");
    }
}

function show(tab){
    document.getElementById("fun").style.display="none";
    document.getElementById("motor").style.display="none";
    document.getElementById("info").style.display="none";

    document.getElementById(tab).style.display="block";
}

function start(){
    alert("Iniciando...");
}
</script>

</body>
</html>
