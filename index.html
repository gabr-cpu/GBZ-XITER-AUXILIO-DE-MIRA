<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GBZ XITER</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    background:#020812;
    color:#fff;
    font-family:'Inter',sans-serif;
}

/* ANIMAÇÃO */
.fade{animation:fade .5s ease}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1}}

/* LOGIN */
.login{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}
.card{
    width:360px;
    padding:30px;
    border-radius:18px;
    background:#071426;
    box-shadow:0 0 40px #00aaff55;
    text-align:center;
}
.logo{
    font-family:'Orbitron',sans-serif;
    font-size:26px;
    color:#00aaff;
    margin-bottom:10px;
}
.sub{opacity:.6;font-size:13px;margin-bottom:15px}

input{
    width:100%;
    padding:14px;
    border-radius:10px;
    border:none;
    background:#030b18;
    color:#fff;
}

button{
    width:100%;
    padding:14px;
    margin-top:12px;
    border:none;
    border-radius:10px;
    background:linear-gradient(45deg,#00aaff,#0066ff);
    color:#fff;
    font-weight:600;
    cursor:pointer;
    transition:.2s;
}
button:hover{transform:scale(1.04)}

/* PANEL */
.panel{
    display:none;
    padding:20px;
}
.header{
    text-align:center;
    font-family:'Orbitron';
    color:#00aaff;
    font-size:22px;
}

/* TABS */
.tabs{
    display:flex;
    justify-content:center;
    gap:8px;
    margin-top:15px;
}
.tabs button{
    width:auto;
    padding:8px 16px;
}

/* BOX */
.box{
    margin-top:20px;
    padding:18px;
    border-radius:14px;
    background:#071426;
    box-shadow:0 0 20px #00aaff33;
}

/* TOGGLE */
.row{
    display:flex;
    justify-content:space-between;
    margin:12px 0;
}

/* SWITCH */
.switch{position:relative;width:42px;height:20px}
.switch input{display:none}
.slider{
    position:absolute;
    width:100%;
    height:100%;
    background:#333;
    border-radius:20px;
}
.slider::before{
    content:"";
    position:absolute;
    width:16px;height:16px;
    background:#fff;
    border-radius:50%;
    top:2px;left:2px;
    transition:.3s;
}
input:checked + .slider{background:#00aaff}
input:checked + .slider::before{transform:translateX(22px)}

/* RANGE */
input[type=range]{width:100%}

/* BTN GRANDE */
.mainbtn{margin-top:15px;font-size:15px}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
  <div class="card fade">
    <div class="logo">GBZ XITER</div>
    <div class="sub">Ativar acesso</div>
    <input id="key" placeholder="Digite a chave">
    <button onclick="login()">ATIVAR</button>
  </div>
</div>

<!-- PANEL -->
<div class="panel fade" id="panel">
  <div class="header">GBZ XITER</div>

  <div class="tabs">
    <button onclick="tab('f')">Funções</button>
    <button onclick="tab('m')">Motor</button>
    <button onclick="tab('i')">Info</button>
  </div>

  <!-- FUNÇÕES -->
  <div class="box" id="f">
    <div class="row">Modo desempenho
      <label class="switch"><input type="checkbox"><span class="slider"></span></label>
    </div>

    <div class="row">Suavização
      <label class="switch"><input type="checkbox"><span class="slider"></span></label>
    </div>

    <div class="row">Redução lag
      <label class="switch"><input type="checkbox"><span class="slider"></span></label>
    </div>

    <button class="mainbtn" onclick="start()">INICIAR</button>
  </div>

  <!-- MOTOR -->
  <div class="box" id="m" style="display:none">
    <p>Sensibilidade</p>
    <input type="range">

    <p>DPI</p>
    <input type="range">

    <p>Velocidade</p>
    <input type="range">
  </div>

  <!-- INFO -->
  <div class="box" id="i" style="display:none">
    <p>Versão: 3.0</p>
    <p>Status: Online</p>
    <p>Sistema: Android</p>
  </div>

</div>

<script>
function login(){
    let k = document.getElementById("key").value.toLowerCase();

    if(k === "gbzstar-666"){
        document.getElementById("login").style.display="none";
        document.getElementById("panel").style.display="block";
    } else {
        alert("Chave inválida");
    }
}

function tab(x){
    document.getElementById("f").style.display="none";
    document.getElementById("m").style.display="none";
    document.getElementById("i").style.display="none";
    document.getElementById(x).style.display="block";
}

function start(){
    alert("Iniciando...");
}
</script>

</body>
</html>
