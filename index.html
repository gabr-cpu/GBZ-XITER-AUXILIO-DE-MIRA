<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GBZ XITER</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
}

body {
    background: radial-gradient(circle at center, #1a0005, #000);
    color: white;
}

/* ANIMAÇÃO */
.fade {
    animation: fade 0.6s ease;
}

@keyframes fade {
    from {opacity: 0; transform: scale(0.95);}
    to {opacity: 1; transform: scale(1);}
}

/* LOGIN */
.container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    background: #0a0a0a;
    padding: 30px;
    border-radius: 20px;
    width: 320px;
    text-align: center;
    box-shadow: 0 0 40px #ff003c;
}

.title {
    font-size: 28px;
    color: #ff003c;
    margin-bottom: 10px;
    font-weight: bold;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border-radius: 10px;
    border: 1px solid #ff003c;
    background: #111;
    color: white;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(45deg,#ff003c,#ff4d6d);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* DASHBOARD */
.dashboard {
    display: none;
    padding: 20px;
    animation: fade 0.6s ease;
}

.header {
    text-align: center;
    font-size: 24px;
    color: #ff003c;
    margin-bottom: 15px;
}

/* TABS */
.tabs {
    display: flex;
    justify-content: center;
}

.tabs button {
    width: auto;
    margin: 5px;
    padding: 10px 15px;
}

/* BOX */
.box {
    margin-top: 20px;
    background: #111;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 0 20px #ff003c;
    animation: fade 0.4s;
}

/* TOGGLE */
.toggle {
    display: flex;
    justify-content: space-between;
    margin: 12px 0;
}

/* SWITCH BONITO */
.switch {
    position: relative;
    width: 40px;
    height: 20px;
}

.switch input {
    display: none;
}

.slider {
    position: absolute;
    background: #333;
    border-radius: 20px;
    width: 100%;
    height: 100%;
    cursor: pointer;
}

.slider::before {
    content: "";
    position: absolute;
    height: 16px;
    width: 16px;
    background: white;
    border-radius: 50%;
    top: 2px;
    left: 2px;
    transition: 0.3s;
}

input:checked + .slider {
    background: #ff003c;
}

input:checked + .slider::before {
    transform: translateX(20px);
}

/* SLIDER */
input[type=range] {
    width: 100%;
}

/* BOTÃO GRANDE */
.big-btn {
    margin-top: 20px;
    font-size: 16px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="container" id="login">
    <div class="card fade">
        <div class="title">GBZ XITER</div>
        <p>Digite sua chave</p>
        <input type="text" id="key" placeholder="Ex: GBZSTAR-666">
        <button onclick="login()">ATIVAR</button>
    </div>
</div>

<!-- PAINEL -->
<div class="dashboard" id="panel">

    <div class="header">GBZ XITER</div>

    <div class="tabs">
        <button onclick="tab('funcoes')">Funções</button>
        <button onclick="tab('config')">Motor</button>
        <button onclick="tab('info')">Info</button>
    </div>

    <!-- FUNÇÕES -->
    <div class="box" id="funcoes">
        <div class="toggle">Modo desempenho
            <label class="switch">
                <input type="checkbox"><span class="slider"></span>
            </label>
        </div>

        <div class="toggle">Suavização de toque
            <label class="switch">
                <input type="checkbox"><span class="slider"></span>
            </label>
        </div>

        <div class="toggle">Redução de lag
            <label class="switch">
                <input type="checkbox"><span class="slider"></span>
            </label>
        </div>

        <button class="big-btn" onclick="start()">INICIAR</button>
    </div>

    <!-- CONFIG -->
    <div class="box" id="config" style="display:none;">
        <p>Sensibilidade</p>
        <input type="range">

        <p>DPI</p>
        <input type="range">

        <p>Velocidade</p>
        <input type="range">
    </div>

    <!-- INFO -->
    <div class="box" id="info" style="display:none;">
        <p>Versão: 2.0</p>
        <p>Status: Ativo</p>
        <p>Sistema: Android</p>
    </div>

</div>

<script>
function login(){
    let key = document.getElementById("key").value;

    if(key === "GBZSTAR-666"){
        document.getElementById("login").style.display = "none";
        document.getElementById("panel").style.display = "block";
    } else {
        alert("Chave inválida!");
    }
}

function tab(id){
    document.getElementById("funcoes").style.display="none";
    document.getElementById("config").style.display="none";
    document.getElementById("info").style.display="none";

    document.getElementById(id).style.display="block";
}

function start(){
    alert("Iniciando otimização...");
}
</script>

</body>
</html>
